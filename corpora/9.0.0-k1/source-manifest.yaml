corpus:
  name: opentrons-knowledge
  version: 9.0.0-k1
  target_opentrons_release: v9.0.0
  corpus_schema_version: 1

sources:
  opentrons_ai_v1:
    repository: https://github.com/Opentrons/opentrons
    tag: ai-server@0.0.20
    commit: aa7bb9efe607a9b781b2b7e50bdc9af94ccc6fbf
    paths:
      - opentrons-ai-server/api/storage/docs
    exclude_paths:
      - opentrons-ai-server/api/storage/docs/pd
    compatibility:
      status: validated
      target_release: v9.0.0
      relationship: latest-ai-server-tag
      validation_record: compatibility/opentrons-ai-v1-v9.0.0.yaml
      notes: >
        AI v1 protocol guides from the latest opentrons-ai-server release tag
        (ai-server@0.0.20). Protocol Designer subtree (pd/) is excluded.

  opentrons_docs:
    repository: https://github.com/Opentrons/opentrons
    tag: mkdocs-2026-06-02
    commit: 345c24085aff7ad19010d4b70648183ce580268b
    paths:
      - docs/python-api/docs
      - docs/python-api/mkdocs.yml
      - docs/flex/docs
      - docs/ot-2/docs
      - api/docs/v2/example_protocols
    build_target: mkdocs
    exclude_paths:
      - docs/python-api/docs/img
    compatibility:
      status: validated
      target_release: v9.0.0
      relationship: docs-deploy-tag-for-9.0.x
      validation_record: compatibility/opentrons-docs-v9.0.0.yaml
      notes: >
        MkDocs deploy tags are independent of robot-stack tags. This pin is the
        last production docs deploy that publishes apiLevel 2.28 /
        robot_stack_version 9.0.0 (after v9.0.0 on 2026-04-06, before the
        9.1.0 docs surface on mkdocs-2026-06-24). The v9.0.0 software tag did
        not yet carry apiLevel / robot_stack_version in mkdocs.yml. Include
        liquid-class-tables/*.md even though MkDocs excludes them from nav;
        they are the generated parameter tables referenced by liquid-class
        definition pages.

  protocol_api:
    repository: https://github.com/Opentrons/opentrons
    tag: v9.0.0
    commit: 44b37a2f91520bf2e7245c70bf799d46c8c2d9a5
    paths:
      - api/src/opentrons/protocol_api
    compatibility:
      status: exact-release
      target_release: v9.0.0
      relationship: exact-release

  shared_data:
    repository: https://github.com/Opentrons/opentrons
    tag: v9.0.0
    commit: 44b37a2f91520bf2e7245c70bf799d46c8c2d9a5
    paths:
      - shared-data/labware/definitions
      - shared-data/labware/schemas
      - shared-data/pipette/definitions
      - shared-data/pipette/schemas
      - shared-data/module/definitions
      - shared-data/module/schemas
      - shared-data/deck/definitions
      - shared-data/deck/schemas
      - shared-data/robot/definitions
      - shared-data/robot/schemas
      - shared-data/liquid-class/definitions
    compatibility:
      status: exact-release
      target_release: v9.0.0
      relationship: exact-release

builder:
  name: opentrons-knowledge-builder
  version: 0.1.0
  commit: null

processing:
  parser_version: 1
  normalization_version: 1
  relationship_model_version: 1
  chunking_strategy: semantic-sections-v1

embedding:
  enabled: true
  provider: fake
  model: fake-hash-v1
  dimensions: 32

publication:
  formats:
    - tar.zst
    - oci
  artifact_name_template: opentrons-knowledge-{version}.tar.zst
  registry: ghcr.io
  repository: opentrons/opentrons-knowledge
