name: validate

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository sources for lint/test/fixture build
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-extras --frozen

      - name: Lint
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests

      - name: Typecheck
        run: uv run mypy

      - name: Unit tests
        run: uv run pytest -q

      - name: Fixture corpus build
        run: uv run opentrons-knowledge build --fixture --output dist

      - name: Validate fixture corpus
        run: uv run opentrons-knowledge validate --corpus dist/opentrons-knowledge-0.0.0-k1

      - name: Upload fixture corpus
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fixture-corpus
          path: dist/opentrons-knowledge-0.0.0-k1
